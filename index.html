<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaradhya's Art Gallery</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables & Editorial Theming */
        :root {
            /* Day Mode (Luxurious Ivory/Paper) */
            --bg: #FDFCF8;
            --card: #FFFFFF;
            --text-primary: #111111;
            --text-poem: #2A2A2A;
            --text-secondary: #777777;
            --border: #EBEBEB;
            --divider: #DCDCDC;
            --shadow-base: 0 4px 20px rgba(0,0,0,0.03);
            --shadow-hover: 0 12px 36px rgba(0,0,0,0.08);
            
            /* Lightbox */
            --overlay: rgba(253, 252, 248, 0.96);
            --lightbox-text: #111111;
            
            /* Shared */
            --transition: 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            --fast-transition: 0.3s ease;
        }

        body.night-mode {
            /* Night Mode (Deep Obsidian) */
            --bg: #0A0A0B;
            --card: #121213;
            --text-primary: #F4F4F4;
            --text-poem: #E0E0E0;
            --text-secondary: #888888;
            --border: #1F1F21;
            --divider: #2A2A2C;
            --shadow-base: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-hover: 0 12px 36px rgba(0,0,0,0.7);
            
            /* Lightbox */
            --overlay: rgba(10, 10, 11, 0.98);
            --lightbox-text: #F4F4F4;
        }

        /* Global Resets & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Typography */
        h1, h2, .poem-content, .intro {
            font-family: 'Cormorant Garamond', Georgia, serif;
        }

        /* Header / Hero Section */
        header {
            text-align: center;
            padding: 140px 20px 100px;
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .header-divider {
            width: 1px;
            height: 60px;
            background-color: var(--divider);
            margin: 0 auto 40px;
            animation: growDown 1s ease forwards;
            transform-origin: top;
            transition: background-color var(--transition);
        }

        h1 {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 24px;
            color: var(--text-primary);
            animation: fadeUp 1s ease forwards;
            opacity: 0;
            animation-delay: 0.3s;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            animation: fadeUp 1s ease forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .intro {
            font-size: 22px;
            font-style: italic;
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.6;
            animation: fadeIn 1.5s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        /* Minimalist Theme Toggle */
        .theme-toggle-container {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 100;
            animation: fadeIn 1s ease forwards;
            opacity: 0;
            animation-delay: 1s;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all var(--fast-transition);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--text-secondary);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            transition: transform 0.5s ease;
        }

        .theme-toggle:hover svg {
            transform: rotate(15deg);
        }

        /* Toggle Logic: Show/Hide based on theme */
        body.day-mode .sun-icon { display: none; }
        body.day-mode .moon-icon { display: block; }
        
        body.night-mode .sun-icon { display: block; }
        body.night-mode .moon-icon { display: none; }

        /* Main Gallery Grid */
        .gallery {
            display: grid;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px 120px;
            gap: 60px;
            grid-template-columns: repeat(3, 1fr);
        }

        @media (max-width: 1100px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                padding: 0 40px 100px;
                gap: 40px;
            }
        }

        @media (max-width: 767px) {
            .gallery {
                grid-template-columns: 1fr;
                padding: 0 20px 80px;
                gap: 30px;
            }
            .theme-toggle-container {
                top: 20px;
                right: 20px;
            }
            .theme-toggle {
                width: 40px;
                height: 40px;
                background: var(--bg);
            }
        }

        /* Poem Cards - Editorial Design */
        .poem-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition), background-color var(--transition), border-color var(--transition);
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        .poem-card.visible {
            animation: fadeUpCard 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .poem-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--text-secondary);
        }

        .card-inner {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Text Poems */
        .poem-title {
            font-size: 24px;
            font-weight: 500;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 30px;
            text-align: center;
            transition: color var(--transition);
        }

        .poem-content {
            font-size: 18px;
            line-height: 1.9;
            color: var(--text-poem);
            text-align: center;
            white-space: pre-line;
            max-width: 400px;
            margin: 0 auto;
            transition: color var(--transition);
        }

        /* Image Poems */
        .poem-image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .poem-image {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 1s ease;
            filter: grayscale(20%) contrast(1.1); /* Subtle artistic filter */
        }
        
        .poem-image.loaded {
            opacity: 1;
        }

        /* Card Dates */
        .date {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: 40px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color var(--transition);
            width: 100%;
        }

        /* Refined Footer */
        footer {
            padding: 0 20px 80px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-divider {
            width: 40px;
            height: 1px;
            background-color: var(--divider);
            margin-bottom: 40px;
            transition: background-color var(--transition);
        }

        .counter {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .copyright {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Minimal Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--overlay);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--fast-transition), visibility var(--fast-transition), background-color var(--transition);
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-close {
            position: absolute;
            top: 40px;
            right: 40px;
            background: none;
            border: none;
            color: var(--lightbox-text);
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            z-index: 1001;
            transition: transform var(--fast-transition), opacity var(--fast-transition);
            opacity: 0.5;
        }

        .lightbox-close:hover {
            transform: scale(1.1);
            opacity: 1;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 1001;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--lightbox-text);
            font-size: 24px;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0.3;
            transition: opacity var(--fast-transition), transform var(--fast-transition);
            padding: 20px;
        }

        .nav-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .lightbox-content-wrapper {
            position: relative;
            width: 90vw;
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: scale(0.98);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lightbox.active .lightbox-content-wrapper {
            transform: scale(1);
        }

        .lightbox .lb-text-container {
            max-width: 600px;
            max-height: 75vh;
            overflow-y: auto;
            padding: 40px;
            scrollbar-width: none;
            text-align: center;
        }
        
        .lightbox .lb-text-container::-webkit-scrollbar { display: none; }

        .lightbox .poem-title {
            color: var(--lightbox-text);
            font-size: 36px;
            margin-bottom: 40px;
        }

        .lightbox .poem-content {
            color: var(--lightbox-text);
            font-size: 24px;
            line-height: 2;
        }

        .lightbox .lb-image {
            max-width: 100vw;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: var(--shadow-hover);
        }

        .lightbox .date {
            color: var(--lightbox-text);
            font-size: 12px;
            opacity: 0.5;
            margin-top: 40px;
            flex-shrink: 0;
        }

        /* Loading Spinner */
        .spinner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        body.night-mode .spinner {
            border-color: rgba(255,255,255,0.1);
            border-top-color: var(--text-secondary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpCard {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes growDown {
            from { transform: scaleY(0); }
            to { transform: scaleY(1); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Lightbox */
        @media (max-width: 767px) {
            .lightbox-nav { padding: 0 10px; }
            .lightbox-close { top: 20px; right: 20px; }
            .lightbox .poem-title { font-size: 28px; }
            .lightbox .poem-content { font-size: 18px; line-height: 1.8; }
            .lightbox .lb-text-container { padding: 20px; }
            h1 { letter-spacing: 4px; }
        }
    </style>
</head>
<body class="day-mode">

    <!-- Minimalist Toggle -->
    <div class="theme-toggle-container">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
            <!-- Moon Icon (Shows in Day Mode) -->
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <!-- Sun Icon (Shows in Night Mode) -->
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </div>

    <!-- Hero Section -->
    <header>
        <div class="header-divider"></div>
        <h1>Aaradhya's Art Gallery</h1>
        <p class="subtitle">May 2025 — Present</p>
        <p class="intro">A curated collection of poetic thoughts and moments,<br>beautifully preserved in time.</p>
    </header>

    <!-- Gallery Grid -->
    <main class="gallery" id="gallery" role="region" aria-label="Poetry Gallery">
        <!-- Cards injected via JavaScript -->
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-divider"></div>
        <p class="counter">14 Curated Pieces</p>
        <p class="copyright">© 2026 Aaradhya. All rights reserved.</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Poem Viewer">
        <button class="lightbox-close" id="lightboxClose" aria-label="Close lightbox">✕</button>
        
        <nav class="lightbox-nav">
            <button class="nav-btn prev" id="lightboxPrev" aria-label="Previous poem">←</button>
            <button class="nav-btn next" id="lightboxNext" aria-label="Next poem">→</button>
        </nav>

        <div class="lightbox-content-wrapper" id="lightboxContent">
            <!-- Content injected dynamically -->
        </div>
    </div>

    <script>
        // Data Structure: 14 Poems
        const poems =[
            {
                id: 1,
                type: "text",
                title: "Whispers of Spring",
                content: "The morning light breaks,\nSoft and golden through the glass,\nA quiet awakening.\n\nShadows stretch and fade,\nLeaving only the warmth of the sun,\nAnd the promise of today.",
                date: "May 23, 2025"
            },
            {
                id: 2,
                type: "text",
                title: "Untitled",
                content: "Silence is not empty.\nIt is full of answers we have yet to hear.\n\nListen closely to the wind,\nIt carries the secrets of the earth.",
                date: "June 2, 2025"
            },
            {
                id: 3,
                type: "text",
                title: "Ocean's Breath",
                content: "Waves crash, recede, return.\nA rhythm older than time itself.\n\nI stand at the edge,\nSmall, insignificant, yet whole.",
                date: "June 19, 2025"
            },
            {
                id: 4,
                type: "text",
                title: "Midnight Thoughts",
                content: "The stars do not ask for attention,\nYet they command the sky.\n\nWe strive so hard to be seen,\nWhen simply being is enough.",
                date: "July 5, 2025"
            },
            {
                id: 5,
                type: "text",
                title: "Rain on Glass",
                content: "Tears from the clouds,\nWashing the world clean.\n\nEach drop a story,\nFalling gracefully to the ground.",
                date: "July 24, 2025"
            },
            {
                id: 6,
                type: "image",
                image: "https://placehold.co/600x800/e6e6e6/666666?text=Scanned+Poem\n\n(August+8)",
                date: "August 8, 2025"
            },
            {
                id: 7,
                type: "image",
                image: "https://placehold.co/700x500/e6e6e6/666666?text=Scanned+Poem\n\n(August+29)",
                date: "August 29, 2025"
            },
            {
                id: 8,
                type: "image",
                image: "https://placehold.co/600x900/e6e6e6/666666?text=Scanned+Poem\n\n(September+15)",
                date: "September 15, 2025"
            },
            {
                id: 9,
                type: "text",
                title: "Autumn Leaves",
                content: "A beautiful letting go.\nColors of fire before the frost.\n\nNature teaches us how to yield,\nHow to release with grace.",
                date: "October 3, 2025"
            },
            {
                id: 10,
                type: "text",
                title: "Untitled",
                content: "Between the ticking of the clock,\nLives a space infinite and still.\n\nFind it.\nDwell within it.",
                date: "October 27, 2025"
            },
            {
                id: 11,
                type: "text",
                title: "Winter's Approach",
                content: "The air turns sharp,\nA cold clarity settles in.\n\nThe world prepares to sleep,\nTo dream beneath the snow.",
                date: "November 18, 2025"
            },
            {
                id: 12,
                type: "image",
                image: "https://placehold.co/600x800/e6e6e6/666666?text=Scanned+Poem\n\n(December+9)",
                date: "December 9, 2025"
            },
            {
                id: 13,
                type: "image",
                image: "https://placehold.co/800x800/e6e6e6/666666?text=Scanned+Poem\n\n(January+21)",
                date: "January 21, 2026"
            },
            {
                id: 14,
                type: "image",
                image: "https://placehold.co/600x750/e6e6e6/666666?text=Scanned+Poem\n\n(February+8)",
                date: "February 8, 2026"
            }
        ];

        // --- THEME MANAGEMENT ---
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        // Check local storage for theme preference
        const savedTheme = localStorage.getItem('aaradhyaTheme');
        if (savedTheme === 'night') {
            body.classList.remove('day-mode');
            body.classList.add('night-mode');
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('night-mode')) {
                body.classList.remove('night-mode');
                body.classList.add('day-mode');
                localStorage.setItem('aaradhyaTheme', 'day');
            } else {
                body.classList.remove('day-mode');
                body.classList.add('night-mode');
                localStorage.setItem('aaradhyaTheme', 'night');
            }
        });

        // --- RENDER GALLERY ---
        const galleryContainer = document.getElementById('gallery');

        function renderGallery() {
            poems.forEach((poem, index) => {
                const article = document.createElement('article');
                article.className = `poem-card`;
                article.setAttribute('data-index', index);
                article.setAttribute('tabindex', '0');
                article.setAttribute('role', 'button');
                article.setAttribute('aria-label', `View poem dated ${poem.date}`);

                let innerHTML = `<div class="card-inner">`;

                if (poem.type === 'text') {
                    innerHTML += `
                        ${poem.title && poem.title !== "Untitled" ? `<h2 class="poem-title">${poem.title}</h2>` : ''}
                        <div class="poem-content">${poem.content}</div>
                    `;
                } else if (poem.type === 'image') {
                    innerHTML += `
                        <div class="poem-image-container">
                            <div class="spinner"></div>
                            <img class="poem-image" src="${poem.image}" alt="Scanned poem dated ${poem.date}" loading="lazy" onload="this.classList.add('loaded'); this.previousElementSibling.style.display='none';">
                        </div>
                    `;
                }

                innerHTML += `</div><time class="date">${poem.date}</time>`;
                article.innerHTML = innerHTML;

                article.addEventListener('click', () => openLightbox(index));
                article.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') openLightbox(index);
                });

                galleryContainer.appendChild(article);
            });
        }

        renderGallery();

        // --- SCROLL ANIMATION ---
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const index = Array.from(galleryContainer.children).indexOf(entry.target);
                    // Slight delay cascade for visual elegance
                    const delay = index < 6 ? (index % 3) * 0.15 : 0; 
                    
                    entry.target.style.animationDelay = `${delay}s`;
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.poem-card').forEach(card => {
            observer.observe(card);
        });

        // --- LIGHTBOX LOGIC ---
        const lightbox = document.getElementById('lightbox');
        const lightboxContent = document.getElementById('lightboxContent');
        const btnClose = document.getElementById('lightboxClose');
        const btnPrev = document.getElementById('lightboxPrev');
        const btnNext = document.getElementById('lightboxNext');
        
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightboxContent();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; 
            btnClose.focus(); 
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            const cards = document.querySelectorAll('.poem-card');
            if(cards[currentIndex]) cards[currentIndex].focus();
        }

        function updateLightboxContent() {
            const poem = poems[currentIndex];
            let contentHTML = '';

            if (poem.type === 'text') {
                contentHTML = `
                    <div class="lb-text-container">
                        ${poem.title && poem.title !== "Untitled" ? `<h2 class="poem-title">${poem.title}</h2>` : ''}
                        <div class="poem-content">${poem.content}</div>
                    </div>
                `;
            } else if (poem.type === 'image') {
                contentHTML = `
                    <img class="lb-image" src="${poem.image}" alt="Scanned poem dated ${poem.date}">
                `;
            }

            contentHTML += `<time class="date">${poem.date}</time>`;
            
            // Fade effect for smooth transitions
            lightboxContent.style.opacity = '0';
            setTimeout(() => {
                lightboxContent.innerHTML = contentHTML;
                lightboxContent.style.opacity = '1';
            }, 150);

            // Update Nav Arrows
            btnPrev.style.opacity = currentIndex === 0 ? '0' : '0.5';
            btnPrev.style.pointerEvents = currentIndex === 0 ? 'none' : 'auto';
            
            btnNext.style.opacity = currentIndex === poems.length - 1 ? '0' : '0.5';
            btnNext.style.pointerEvents = currentIndex === poems.length - 1 ? 'none' : 'auto';
        }

        function nextPoem() {
            if (currentIndex < poems.length - 1) {
                currentIndex++;
                updateLightboxContent();
            }
        }

        function prevPoem() {
            if (currentIndex > 0) {
                currentIndex--;
                updateLightboxContent();
            }
        }

        // Listeners
        btnClose.addEventListener('click', closeLightbox);
        btnNext.addEventListener('click', (e) => { e.stopPropagation(); nextPoem(); });
        btnPrev.addEventListener('click', (e) => { e.stopPropagation(); prevPoem(); });
        
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target === lightboxContent) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            else if (e.key === 'ArrowRight') nextPoem();
            else if (e.key === 'ArrowLeft') prevPoem();
        });

    </script>
</body>
</html>
